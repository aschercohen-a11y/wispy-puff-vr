<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Wispy Puff VR — Étape 0</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; background:#05070f; overflow:hidden; font-family:'Trebuchet MS','Segoe UI',sans-serif; color:#dbe6ff; }

  /* Le jeu 2D tourne dans ce canvas, mais on le cache hors écran :
     three.js le récupère comme texture. Le canvas continue de se dessiner même hors-vue. */
  #wrap { position:fixed; left:-99999px; top:0; }

  /* Petit bandeau d'info visible sur le bureau (pas dans le casque) */
  #info {
    position:fixed; left:0; right:0; bottom:0; z-index:20;
    padding:12px 16px; text-align:center; font-size:14px;
    background:linear-gradient(180deg,rgba(10,16,40,0),rgba(10,16,40,.85));
    color:#9fb6e6; pointer-events:none;
  }
  #info b { color:#cfe4ff; }
  /* Le bouton "ENTER VR" de three.js est stylé par la lib ; on le laisse tel quel. */
</style>

<!-- three.js en local (aucune dépendance internet) -->
<script type="importmap">
{ "imports": { "three": "./vendor/three.module.js" } }
</script>
</head>
<body>

<!-- ================================================================
     1) DOM attendu par game.js (canvas + overlays).
        Repris à l'identique de l'index d'origine, mais placé hors écran.
        game.js appelle el('menu'), el('hud')… : ces éléments DOIVENT exister.
     ================================================================ -->
<div id="wrap">
  <canvas id="game"></canvas>

  <div id="hud" class="hidden">
    <span>Niveau <b id="hud-level">1</b></span>
    <span>Bulles <b id="hud-lives">3</b></span>
    <span>Score <b id="hud-score">0</b></span>
    <span>Temps <b id="hud-time">0s</b></span>
  </div>

  <div id="menu" class="overlay">
    <img id="btn-start" src="assets/boutonPlay.png" alt="start" />
    <div id="lvlbtns"></div>
    <button id="btn-editor">editor</button>
  </div>
  <div id="levelclear" class="overlay hidden"><button id="btn-next">next</button></div>
  <div id="gameover" class="overlay hidden"><button id="btn-retry">retry</button></div>
  <div id="victory" class="overlay hidden"><button id="btn-replay">replay</button></div>
</div>

<div id="info">🧡 Wispy Puff — dirige le personnage ! <b>PC :</b> joystick (bas-gauche) ou <b>WASD</b> = marcher · <b>glisser la souris</b> = tourner la caméra · <b>Espace</b> ou ⤒ = sauter · attrape les diamants ! <b>Mobile :</b> joystick + bouton saut. <b>Casque :</b> ENTER VR (stick = marcher, A/B = saut).</div>

<!-- 2) Le jeu, inchangé (il pilote sa propre boucle via requestAnimationFrame) -->
<script src="game.js"></script>

<!-- 3) Init : canvas à résolution fixe + passerelle manettes + démarrage du niveau -->
<script>
  // On fige le canvas à la résolution native du monde (1280×720) pour une texture nette.
  window.removeEventListener('resize', resize); // neutralise le redimensionnement fenêtre
  canvas.width = 1280;
  canvas.height = 720;
  scale = 1; viewX = 0; viewY = 0;

  // Passerelle entrées VR → variables de game.js (ce script classique voit sticks/ghost/keys).
  // mv  : {x,y} du stick gauche (-1..1) ou null (relâché) → déplacement
  // aim : {x,y} du stick droit ou null → oriente le fantôme (garde la direction si null)
  // blow: booléen (gâchette) → souffle
  window.__vrInput = function (mv, aim, blow) {
    if (mv) { sticks.move.id = 'vr'; sticks.move.kx = mv.x * STICK_MAX; sticks.move.ky = mv.y * STICK_MAX; }
    else    { sticks.move.id = null; sticks.move.kx = 0; sticks.move.ky = 0; }
    if (aim) { ghost.angle = Math.atan2(aim.y, aim.x); }
    keys['Space'] = !!blow;
  };

  startGame();                 // charge le niveau image et passe en GS.PLAY (pas de menu à cliquer)
  // Note : le jeu (décor + obstacles + fantôme + bulle) est rendu ENTIER sur un seul plan
  //        → tout est cohérent, à la même profondeur. Le relief interne (pop-up) viendra
  //        quand on découpera le décor en calques (obstacles au plan de jeu, fond au loin).
</script>

<!-- 5) Scène WebXR : l'écran flottant -->
<script type="module">
  import * as THREE from 'three';
  import { VRButton } from './vendor/VRButton.js';
  import { GLTFLoader } from './vendor/loaders/GLTFLoader.js';
  import { OrbitControls } from './vendor/controls/OrbitControls.js';

  const gameCanvas = document.getElementById('game');

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x9fc4ea); // secours si la texture du ciel tarde (bleu jour)

  const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.05, 100);
  camera.position.set(0, 1.6, 0); // hauteur des yeux (assis/debout) ; le casque prend le relais en VR

  // « rig joueur » : porte la caméra. On déplace/pivote CE groupe pour se déplacer en VR.
  const player = new THREE.Group();
  player.add(camera);
  scene.add(player);

  // ============================================================
  //  PERSONNAGE JOUABLE (GLB Meshy : riggé + animé Walking/Running)
  //  Dirigé au joystick : MARCHE + SAUT + ramasse les DIAMANTS. Caméra 3e personne.
  // ============================================================
  const hero = new THREE.Group();
  const heroMesh = new THREE.Group();      // partie visuelle séparée de la physique
  hero.add(heroMesh);
  hero.position.set(-11, 0, 0);              // départ au bout de la route
  hero.rotation.y = Math.PI / 2;             // face à la route (le long de +X)
  scene.add(hero);

  const HERO_HEIGHT = 0.55;                  // taille cible du perso (unités monde)
  const MODEL_YAW = 0;                        // orientation du modèle (validé : on voit le dos en marche avant)
  let heroMixer = null, walkAction = null, runAction = null, jumpAction = null, idleAction = null, fallAction = null, heroReady = false;
  let heroWasAir = false, heroJumpW = 0, heroWalkW = 0, heroIdleW = 0, heroFallW = 0;   // fondus idle/walk/jump/fall
  new GLTFLoader().load('models/character.glb?v=2', function (gltf) {
    const m = gltf.scene;
    let box = new THREE.Box3().setFromObject(m);
    const size = new THREE.Vector3(); box.getSize(size);
    m.scale.setScalar(HERO_HEIGHT / (size.y || 1));
    box = new THREE.Box3().setFromObject(m);                 // recalcul après échelle
    m.position.y -= box.min.y;                                // pieds au sol (y=0)
    m.position.x -= (box.min.x + box.max.x) / 2;             // centré
    m.position.z -= (box.min.z + box.max.z) / 2;
    m.rotation.y = MODEL_YAW;
    m.traverse(o => {
      if (!o.isMesh) return;
      o.frustumCulled = false; o.castShadow = false;
      const mats = Array.isArray(o.material) ? o.material : [o.material];
      for (const mat of mats) {                       // fix « on voit l'intérieur du corps » de dos/profil
        if (!mat) continue;
        mat.side = THREE.DoubleSide;                  // dessine les 2 faces (normales parfois inversées)
        mat.transparent = false; mat.opacity = 1;     // aucune transparence
        mat.depthWrite = true; mat.alphaTest = 0;
        mat.needsUpdate = true;
      }
    });
    heroMesh.add(m);
    heroMixer = new THREE.AnimationMixer(m);
    const clips = gltf.animations || [];
    // ROOT MOTION : on ne touche qu'à la piste de position du bassin (Hips).
    //  - anims normales : on la retire (marche/saut SUR PLACE, la physique gère le déplacement)
    //  - anim de CHUTE : on garde la composante VERTICALE (le corps descend au sol) mais on fige
    //    l'horizontale à sa valeur de repos (sinon double déplacement avec l'élan qu'on ajoute).
    const HIPS_REST_X = 0.364, HIPS_REST_Z = -11.285;
    clips.forEach(c => {
      const isFall = /fall/i.test(c.name);
      c.tracks = c.tracks.filter(t => {
        if (t.name.includes('Hips') && t.name.endsWith('.position')) {
          if (isFall) { for (let i = 0; i < t.values.length; i += 3) { t.values[i] = HIPS_REST_X; t.values[i + 2] = HIPS_REST_Z; } return true; }
          return false;
        }
        return true;
      });
    });
    const walk = clips.find(c => /walk/i.test(c.name)) || clips[0];
    const jump = clips.find(c => /obstacle/i.test(c.name)) || clips.find(c => /jump/i.test(c.name));
    const run  = clips.find(c => /run/i.test(c.name));
    const fall = clips.find(c => /fall/i.test(c.name));
    const idle = clips.find(c => !/walk|run|jump|obstacle|fall/i.test(c.name));   // l'idle (Lower_Weapon_Look_Raise)
    if (walk) { walkAction = heroMixer.clipAction(walk); walkAction.play(); walkAction.setEffectiveWeight(0); }
    if (jump) { jumpAction = heroMixer.clipAction(jump); jumpAction.setLoop(THREE.LoopRepeat); jumpAction.play(); jumpAction.setEffectiveWeight(0); }
    if (idle) { idleAction = heroMixer.clipAction(idle); idleAction.play(); idleAction.setEffectiveWeight(1); }
    if (fall) { fallAction = heroMixer.clipAction(fall); fallAction.setLoop(THREE.LoopOnce); fallAction.clampWhenFinished = true; fallAction.play(); fallAction.setEffectiveWeight(0); }
    if (run)  { runAction = heroMixer.clipAction(run); }
    heroReady = true;
  });

  // physique + réglages du perso
  let heroVelY = 0, heroOnGround = true, heroWalk = 0, heroMoving = false;
  const HERO_SPEED = 3.6, HERO_JUMP = 6.0, HERO_GRAVITY = 15, HERO_CLAMP = 29;   // plateau agrandi
  const VR_HERO_SCALE = 0.6;                  // le perso est réduit en VR (paraît trop grand sinon)
  const HERO_RADIUS = 0.28;                   // rayon de collision du perso
  let heroFallT = 0, heroFallVX = 0, heroFallVZ = 0;   // chute : timer + élan « de l'autre côté »
  const walkPlatforms = [];                   // {x0,x1,z0,z1,h} : surfaces surélevées marchables (trottoirs)
  const barriers = [];                        // barrières rouges/blanches à sauter (sur la route)
  const assetBase = {};                       // modèles de base pour l'ÉDITEUR (peuplé au chargement)
  const EDIT = { on: false, type: 'house1', sel: null, placed: [], drag: false, orbit: false, pan: false,
                 yaw: Math.PI * 0.2, pitch: 0.85, dist: 20, tx: 0, tz: 0, lx: 0, ly: 0, hold: {} };
  // Stockage partagé PC↔casque (table DÉDIÉE, ne touche pas aux données de l'app)
  const SB_URL = 'https://supabase-api.swipego.app';
  const SB_ANON = 'eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpc3MiOiJzdXBhYmFzZSIsImlhdCI6MTc3MTI3NDIyMCwiZXhwIjo0OTI2OTQ3ODIwLCJyb2xlIjoiYW5vbiJ9.4c5wruvy-jj3M8fSjhmgR4FvdF6za-mgawlkB_B0uB0';
  const ROAD = { z: 0, len: 58, w: 6, sideW: 2.2, sideH: 0.22 };   // chaussée DOUBLÉE (w 3→6), trottoirs inchangés
  ROAD.halfSpan = ROAD.w / 2 + ROAD.sideW;    // demi-largeur route + trottoirs
  function onRoad(x, z) { return Math.abs(x) <= ROAD.len / 2 && z >= ROAD.z - ROAD.halfSpan && z <= ROAD.z + ROAD.halfSpan; }
  function tryJump() { if (heroOnGround && heroFallT <= 0) { heroVelY = HERO_JUMP; heroOnGround = false; } }

  // caméra 3e personne : orbite autour du perso (souris/tactile = tourner)
  let camYaw = Math.PI / 2 + Math.PI, camPitch = 0.42;   // caméra derrière le perso (qui regarde +X / la route)
  const CAM_DIST = 6.4;
  const _camTarget = new THREE.Vector3(), _hv = new THREE.Vector3();
  function updateFollowCam() {
    _camTarget.set(hero.position.x, hero.position.y + 0.7, hero.position.z);
    const cd = CAM_DIST * Math.cos(camPitch);
    camera.position.set(
      _camTarget.x + Math.sin(camYaw) * cd,
      _camTarget.y + CAM_DIST * Math.sin(camPitch),
      _camTarget.z + Math.cos(camYaw) * cd
    );
    camera.lookAt(_camTarget);
  }
  // VR : la caméra suit le perso — on place le RIG derrière ET AU-DESSUS (vue en plongée), le casque gère le regard
  const VR_DIST = 5.0, VR_HEIGHT = 1.1;       // hauteur du rig VR : légère plongée (baisse la tête pour voir le perso)
  function updateFollowRigVR() {
    player.position.set(
      hero.position.x + Math.sin(camYaw) * VR_DIST,
      VR_HEIGHT,
      hero.position.z + Math.cos(camYaw) * VR_DIST
    );
    player.rotation.y = camYaw;                 // oriente le rig vers le perso (regard neutre = perso en face)
  }

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(devicePixelRatio);
  renderer.setSize(innerWidth, innerHeight);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.xr.enabled = true;
  renderer.xr.setReferenceSpaceType('local-floor');
  // Rendu VR NET : supersampling du framebuffer + pas de rendu fovéal (bords nets)
  try { renderer.xr.setFramebufferScaleFactor(1.5); } catch (e) {}   // 1.0 = natif ; 1.5 = plus net (baisser si ça rame)
  try { renderer.xr.setFoveation(0); } catch (e) {}                  // 0 = aucune dégradation périphérique
  document.body.appendChild(renderer.domElement);
  const vrBtn = VRButton.createButton(renderer);
  document.body.appendChild(vrBtn);
  // Rendre le bouton "ENTER VR" GROS et bien visible (sinon on le rate / on prend celui du navigateur)
  const styleVR = function () {
    vrBtn.style.cssText += ';padding:18px 40px !important;font-size:24px !important;bottom:32px !important;left:50% !important;transform:translateX(-50%) !important;border:4px solid #8fe !important;border-radius:36px !important;background:rgba(15,35,70,0.94) !important;color:#dfffff !important;opacity:1 !important;z-index:60 !important;width:auto !important;letter-spacing:1px !important;';
  };
  styleVR(); let _vt = 0; const _vi = setInterval(function () { styleVR(); if (++_vt > 12) clearInterval(_vi); }, 200);

  // PERSO : marche + saut + gravité (le fantôme volant est désactivé).
  let mobileUp = false, mobileDown = false;   // (obsolètes — plus de vol vertical)
  function jump() { tryJump(); }   // bouton A/B (VR) = saut

  // Souffle (bulle) : sources d'entrée (VR gâchette / mobile bouton / PC touche F)
  let vrTrigger = false, mobileBlow = false, pcBlow = false;
  // État clavier PC : WASD/flèches = voler, Espace/Maj = monter/descendre, F = souffler, G = planter
  let kW = false, kA = false, kS = false, kD = false;
  addEventListener('keydown', (e) => {
    switch (e.code) {
      case 'KeyF': pcBlow = true; break;
      case 'KeyG': plant(); break;
      case 'KeyW': case 'ArrowUp': kW = true; break;
      case 'KeyS': case 'ArrowDown': kS = true; break;
      case 'KeyA': case 'ArrowLeft': kA = true; break;
      case 'KeyD': case 'ArrowRight': kD = true; break;
      case 'Space': if (!e.repeat) tryJump(); e.preventDefault(); break;
    }
  });
  addEventListener('keyup', (e) => {
    switch (e.code) {
      case 'KeyF': pcBlow = false; break;
      case 'KeyW': case 'ArrowUp': kW = false; break;
      case 'KeyS': case 'ArrowDown': kS = false; break;
      case 'KeyA': case 'ArrowLeft': kA = false; break;
      case 'KeyD': case 'ArrowRight': kD = false; break;
    }
  });

  // Détection tactile (téléphone/tablette)
  const MOBILE = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

  // État des contrôles mobiles (marche + regard)
  let controls = null;
  let joyX = 0, joyY = 0, mYaw = 0, mPitch = 0, lookId = null, lastLX = 0, lastLY = 0;

  if (!MOBILE) {
    // PC : 3e personne — souris = tourner la caméra autour du perso, JOYSTICK souris (+ WASD) = marcher, Espace = saut
    const dom = renderer.domElement;
    dom.style.touchAction = 'none';
    dom.addEventListener('contextmenu', (e) => e.preventDefault());   // pas de menu clic droit

    // --- Caméra 3e personne : glisser la souris pour orbiter autour du perso ---
    let dragLook = false;
    dom.addEventListener('pointerdown', (e) => {
      if (EDIT.on) return;                       // éditeur actif : la souris pilote l'éditeur
      dragLook = true; lastLX = e.clientX; lastLY = e.clientY;
      try { dom.setPointerCapture(e.pointerId); } catch (_) {}
    });
    dom.addEventListener('pointermove', (e) => {
      if (EDIT.on || !dragLook) return;
      camPitch += (e.clientY - lastLY) * 0.005;              // caméra derrière : la souris règle juste la hauteur de vue
      lastLX = e.clientX; lastLY = e.clientY;
      camPitch = Math.max(0.12, Math.min(1.3, camPitch));
    });
    const endLook = () => { dragLook = false; };
    dom.addEventListener('pointerup', endLook);
    dom.addEventListener('pointercancel', endLook);

    // --- Joystick SOURIS (marcher) en bas à gauche ---
    const base = document.createElement('div');
    base.style.cssText = 'position:fixed;left:24px;bottom:70px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.14);border:2px solid rgba(255,255,255,.4);z-index:30;touch-action:none;cursor:grab;';
    const knob = document.createElement('div');
    knob.style.cssText = 'position:absolute;left:35px;top:35px;width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.6);pointer-events:none;';
    base.appendChild(knob); document.body.appendChild(base);
    const R = 45; let jactive = false;
    function setKnob(dx, dy) {
      const d = Math.hypot(dx, dy); if (d > R) { dx = dx / d * R; dy = dy / d * R; }
      knob.style.left = (35 + dx) + 'px'; knob.style.top = (35 + dy) + 'px';
      joyX = dx / R; joyY = dy / R;
    }
    function joyFrom(e) { const r = base.getBoundingClientRect(); setKnob(e.clientX - r.left - 60, e.clientY - r.top - 60); }
    base.addEventListener('pointerdown', (e) => { jactive = true; try { base.setPointerCapture(e.pointerId); } catch (_) {} joyFrom(e); e.preventDefault(); });
    base.addEventListener('pointermove', (e) => { if (jactive) joyFrom(e); });
    const endJoy = () => { jactive = false; joyX = 0; joyY = 0; knob.style.left = '35px'; knob.style.top = '35px'; };
    base.addEventListener('pointerup', endJoy); base.addEventListener('pointercancel', endJoy);

    // --- Bouton SAUT (souris) ---
    const jbtn = document.createElement('div'); jbtn.textContent = '⤒';
    jbtn.style.cssText = 'position:fixed;right:24px;bottom:80px;width:84px;height:84px;border-radius:50%;background:rgba(120,200,255,.30);border:2px solid rgba(255,255,255,.55);z-index:30;display:flex;align-items:center;justify-content:center;font-size:40px;color:#fff;user-select:none;cursor:pointer;';
    jbtn.addEventListener('pointerdown', (e) => { tryJump(); e.preventDefault(); });
    document.body.appendChild(jbtn);
  } else {
    // TÉLÉPHONE : joystick (marcher) + glisser (regarder)
    const base = document.createElement('div');
    base.style.cssText = 'position:fixed;left:24px;bottom:70px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.14);border:2px solid rgba(255,255,255,.4);z-index:30;touch-action:none;';
    const knob = document.createElement('div');
    knob.style.cssText = 'position:absolute;left:35px;top:35px;width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.6);';
    base.appendChild(knob); document.body.appendChild(base);
    const R = 45; let jid = null;
    function setKnob(dx, dy) {
      const d = Math.hypot(dx, dy); if (d > R) { dx = dx / d * R; dy = dy / d * R; }
      knob.style.left = (35 + dx) + 'px'; knob.style.top = (35 + dy) + 'px';
      joyX = dx / R; joyY = dy / R;
    }
    function joyFrom(t) { const r = base.getBoundingClientRect(); setKnob(t.clientX - r.left - 60, t.clientY - r.top - 60); }
    base.addEventListener('touchstart', (e) => { const t = e.changedTouches[0]; jid = t.identifier; joyFrom(t); e.preventDefault(); }, { passive: false });
    base.addEventListener('touchmove', (e) => { for (const t of e.changedTouches) if (t.identifier === jid) joyFrom(t); e.preventDefault(); }, { passive: false });
    const endJoy = (e) => { for (const t of e.changedTouches) if (t.identifier === jid) { jid = null; joyX = 0; joyY = 0; knob.style.left = '35px'; knob.style.top = '35px'; } };
    base.addEventListener('touchend', endJoy); base.addEventListener('touchcancel', endJoy);

    const dom = renderer.domElement;
    dom.addEventListener('touchstart', (e) => { const t = e.changedTouches[0]; lookId = t.identifier; lastLX = t.clientX; lastLY = t.clientY; }, { passive: false });
    dom.addEventListener('touchmove', (e) => {
      for (const t of e.changedTouches) if (t.identifier === lookId) {
        camPitch += (t.clientY - lastLY) * 0.005;   // caméra derrière : glisser = hauteur de vue
        lastLX = t.clientX; lastLY = t.clientY;
        camPitch = Math.max(0.12, Math.min(1.3, camPitch));
      }
      e.preventDefault();
    }, { passive: false });
    const endLook = (e) => { for (const t of e.changedTouches) if (t.identifier === lookId) lookId = null; };
    dom.addEventListener('touchend', endLook); dom.addEventListener('touchcancel', endLook);

    // Bouton SAUT
    const jbtn = document.createElement('div'); jbtn.textContent = '⤒';
    jbtn.style.cssText = 'position:fixed;right:24px;bottom:80px;width:84px;height:84px;border-radius:50%;background:rgba(120,200,255,.30);border:2px solid rgba(255,255,255,.55);z-index:30;touch-action:none;display:flex;align-items:center;justify-content:center;font-size:40px;color:#fff;user-select:none;';
    jbtn.addEventListener('touchstart', (e) => { tryJump(); e.preventDefault(); }, { passive: false });
    document.body.appendChild(jbtn);

    // Bouton SOUFFLER (à gauche du saut)
    const bbtn = document.createElement('div');
    bbtn.textContent = '💨';
    bbtn.style.cssText = 'position:fixed;right:120px;bottom:80px;width:84px;height:84px;border-radius:50%;background:rgba(190,240,255,.30);border:2px solid rgba(255,255,255,.55);z-index:30;touch-action:none;display:flex;align-items:center;justify-content:center;font-size:34px;user-select:none;';
    bbtn.addEventListener('touchstart', (e) => { mobileBlow = true; e.preventDefault(); }, { passive: false });
    bbtn.addEventListener('touchend', () => { mobileBlow = false; });
    bbtn.addEventListener('touchcancel', () => { mobileBlow = false; });
    document.body.appendChild(bbtn);

    // Bouton PLANTER (à gauche du souffle)
    const pbtn = document.createElement('div');
    pbtn.textContent = '🌱';
    pbtn.style.cssText = 'position:fixed;right:216px;bottom:80px;width:84px;height:84px;border-radius:50%;background:rgba(150,220,150,.30);border:2px solid rgba(255,255,255,.55);z-index:30;touch-action:none;display:flex;align-items:center;justify-content:center;font-size:34px;user-select:none;';
    pbtn.addEventListener('touchstart', (e) => { plant(); e.preventDefault(); }, { passive: false });
    document.body.appendChild(pbtn);
  }

  // Écran de jeu 2D — MASQUÉ pour l'instant (mettre GAME_ENABLED = true pour le réafficher)
  const GAME_ENABLED = false;
  const DAYTIME = true;   // true = ciel bleu + soleil ; false = nuit étoilée

  // --- Écran flottant texturé par le canvas du jeu ---
  const tex = new THREE.CanvasTexture(gameCanvas);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;
  tex.generateMipmaps = false;

  const screenW = 3.2, screenH = screenW * 720 / 1280; // 16:9
  const ACTION_Z = -2.6, ACTION_Y = 1.55;
  const screen = new THREE.Mesh(
    new THREE.PlaneGeometry(screenW, screenH),
    new THREE.MeshBasicMaterial({ map: tex, transparent: true })
  );
  screen.position.set(0, ACTION_Y, ACTION_Z);
  if (GAME_ENABLED) scene.add(screen);

  // ============================================================
  //  SOL HERBE + LUMIÈRE + LIMITE DU JARDIN
  // ============================================================
  // Lumière : jour (soleil chaud) ou nuit (lune bleutée) selon DAYTIME
  scene.add(new THREE.HemisphereLight(
    DAYTIME ? 0xbcd8ff : 0x93a7ff, DAYTIME ? 0x6a8a4a : 0x1a2a1a, DAYTIME ? 1.1 : 0.9));
  const sunLight = new THREE.DirectionalLight(DAYTIME ? 0xfff2d0 : 0xcfe0ff, DAYTIME ? 1.7 : 0.7);
  sunLight.position.set(0.35 * 20, 0.62 * 20, -0.70 * 20); // depuis la direction du soleil
  scene.add(sunLight);

  // Sol : herbe = un grand disque + texture d'herbe procédurale répétée
  function makeGrassTexture() {
    const s = 512, c = document.createElement('canvas'); c.width = c.height = s;
    const x = c.getContext('2d');
    x.fillStyle = '#2f5d34'; x.fillRect(0, 0, s, s);               // vert de base
    for (let i = 0; i < 9000; i++) {                              // brins/nuances
      const g = 60 + (Math.random() * 90 | 0);
      x.fillStyle = 'rgba(' + (30 + (Math.random()*40|0)) + ',' + g + ',' + (40 + (Math.random()*30|0)) + ',0.5)';
      x.fillRect(Math.random()*s, Math.random()*s, 1.5, 2 + Math.random()*3);
    }
    const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace;
    t.wrapS = t.wrapT = THREE.RepeatWrapping; t.repeat.set(28, 28);
    return t;
  }
  const GARDEN_R = 30;                                            // rayon du jardin (plateau agrandi ×2)
  const ground = new THREE.Mesh(
    new THREE.CircleGeometry(GARDEN_R, 64),
    new THREE.MeshStandardMaterial({ map: makeGrassTexture(), roughness: 1, metalness: 0 })
  );
  ground.rotation.x = -Math.PI / 2;                              // à plat
  scene.add(ground);

  // --- VRAIE HERBE : milliers de brins DEBOUT (InstancedMesh) + léger vent ---
  let grassWind = null;
  {
    const H = 0.32, W = 0.04, SEG = 4;
    const bg = new THREE.PlaneGeometry(W, H, 1, SEG);
    bg.translate(0, H / 2, 0);                          // base du brin à y=0
    const bp = bg.attributes.position, cols = [];
    const cBase = new THREE.Color(0x356e28), cTip = new THREE.Color(0x8fce5a);
    for (let i = 0; i < bp.count; i++) {
      const t = bp.getY(i) / H;                         // 0 = base, 1 = pointe
      bp.setX(i, bp.getX(i) * (1 - t * 0.85));          // effilé vers la pointe
      bp.setZ(i, bp.getZ(i) + t * t * 0.05);            // légère courbure
      const c = cBase.clone().lerp(cTip, t);
      cols.push(c.r, c.g, c.b);                         // dégradé base sombre → pointe claire
    }
    bg.setAttribute('color', new THREE.Float32BufferAttribute(cols, 3));
    bg.computeVertexNormals();

    const gm = new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 1, metalness: 0, side: THREE.DoubleSide });
    gm.onBeforeCompile = (sh) => {                       // vent : la pointe oscille, pas la base
      sh.uniforms.uTime = { value: 0 }; grassWind = sh.uniforms.uTime;
      sh.vertexShader = 'uniform float uTime;\n' + sh.vertexShader.replace(
        '#include <begin_vertex>',
        '#include <begin_vertex>\n float ph = instanceMatrix[3].x*0.6 + instanceMatrix[3].z*0.6;\n transformed.x += sin(uTime*1.6 + ph) * uv.y * uv.y * 0.07;'
      );
    };

    const COUNT = 11000;                                // plateau ×2 → plus de brins pour garder la densité
    const grass = new THREE.InstancedMesh(bg, gm, COUNT);
    const d = new THREE.Object3D();
    for (let i = 0; i < COUNT; i++) {
      let px = 0, pz = 0, tries = 0;
      do { const a = Math.random() * Math.PI * 2, r = Math.sqrt(Math.random()) * (GARDEN_R - 1); px = Math.cos(a) * r; pz = Math.sin(a) * r; tries++; } while (onRoad(px, pz) && tries < 8);
      if (onRoad(px, pz)) { d.scale.setScalar(0); d.position.set(0, -5, 0); d.updateMatrix(); grass.setMatrixAt(i, d.matrix); continue; }   // rien sur la route
      d.position.set(px, 0, pz);
      d.rotation.set((Math.random() - 0.5) * 0.3, Math.random() * Math.PI * 2, (Math.random() - 0.5) * 0.3);
      d.scale.setScalar(0.7 + Math.random() * 0.8);
      d.updateMatrix();
      grass.setMatrixAt(i, d.matrix);
    }
    scene.add(grass);
  }

  // Obstacles qui font ÉCLATER la bulle (rempli au fur et à mesure : buissons, arbres, maison)
  const obstacles = [];

  // Limite : anneau de buissons VISIBLE + garde-fou en CODE (BOUND_R, appliqué dans updateVR)
  const BOUND_R = GARDEN_R - 1.5;
  const bushGeo = new THREE.IcosahedronGeometry(0.6, 1);
  const bushMat = new THREE.MeshStandardMaterial({ color: 0x2b6b3a, roughness: 1, flatShading: true });
  for (let i = 0; i < 92; i++) {
    const a = (i / 92) * Math.PI * 2;
    const b = new THREE.Mesh(bushGeo, bushMat);
    b.position.set(Math.cos(a) * GARDEN_R * 0.98, 0.35, Math.sin(a) * GARDEN_R * 0.98);
    b.scale.setScalar(0.7 + Math.random() * 0.9);
    scene.add(b);
    obstacles.push({ pos: b.position.clone().setY(0.55), r: 0.55 * b.scale.x });
  }

  // ============================================================
  //  ENVIRONNEMENT ENVELOPPANT : ciel + étoiles + nuages
  //  → on peut tourner la tête, plus de noir total.
  // ============================================================

  // --- Dôme de ciel : dégradé crépusculaire assorti à la grotte ---
  function makeSkyTexture() {
    const c = document.createElement('canvas'); c.width = 16; c.height = 256;
    const x = c.getContext('2d');
    const g = x.createLinearGradient(0, 0, 0, 256);
    if (DAYTIME) {
      g.addColorStop(0.00, '#2b6fd6'); // zénith bleu
      g.addColorStop(0.45, '#5b9be6');
      g.addColorStop(0.78, '#a9d4f2');
      g.addColorStop(0.92, '#d8eefb'); // horizon pâle
      g.addColorStop(1.00, '#cfe6f2');
    } else {
      g.addColorStop(0.00, '#05071a'); // zénith (nuit profonde)
      g.addColorStop(0.42, '#141a4d');
      g.addColorStop(0.70, '#3c2a72'); // violet magique
      g.addColorStop(0.88, '#7d4a8e'); // horizon rosé
      g.addColorStop(1.00, '#2e2258');
    }
    x.fillStyle = g; x.fillRect(0, 0, 16, 256);
    const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace; return t;
  }
  const sky = new THREE.Mesh(
    new THREE.SphereGeometry(50, 32, 16),
    new THREE.MeshBasicMaterial({ map: makeSkyTexture(), side: THREE.BackSide, depthWrite: false })
  );
  scene.add(sky);

  // --- Soleil (jour) : disque lumineux + halo additif ---
  if (DAYTIME) {
    const sunPos = new THREE.Vector3(0.35, 0.62, -0.70).normalize().multiplyScalar(44);
    const sun = new THREE.Mesh(
      new THREE.SphereGeometry(2.4, 24, 24),
      new THREE.MeshBasicMaterial({ color: 0xfff6d8 })
    );
    sun.position.copy(sunPos); scene.add(sun);
    // halo doux (sprite additif)
    const gs = 128, gc = document.createElement('canvas'); gc.width = gc.height = gs;
    const gx = gc.getContext('2d');
    const gg = gx.createRadialGradient(gs/2, gs/2, 0, gs/2, gs/2, gs/2);
    gg.addColorStop(0, 'rgba(255,248,220,0.95)');
    gg.addColorStop(0.4, 'rgba(255,240,190,0.35)');
    gg.addColorStop(1, 'rgba(255,240,190,0)');
    gx.fillStyle = gg; gx.fillRect(0, 0, gs, gs);
    const glow = new THREE.Sprite(new THREE.SpriteMaterial({
      map: new THREE.CanvasTexture(gc), blending: THREE.AdditiveBlending, depthWrite: false, transparent: true
    }));
    glow.scale.setScalar(16); glow.position.copy(sunPos); scene.add(glow);
  }

  // --- Étoiles (seulement la nuit) ---
  if (!DAYTIME) {
    const N = 700, sp = new Float32Array(N * 3);
    for (let i = 0; i < N; i++) {
      const th = Math.random() * Math.PI * 2, ph = Math.acos(1 - Math.random() * 0.9), r = 46;
      sp[i*3] = r * Math.sin(ph) * Math.cos(th);
      sp[i*3+1] = r * Math.cos(ph) + 2;
      sp[i*3+2] = r * Math.sin(ph) * Math.sin(th);
    }
    const starGeo = new THREE.BufferGeometry();
    starGeo.setAttribute('position', new THREE.BufferAttribute(sp, 3));
    scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({
      color: 0xbfd4ff, size: 0.2, sizeAttenuation: true, transparent: true, opacity: 0.9, depthWrite: false
    })));
  }

  // --- Nuages : texture douce procédurale + billboards qui dérivent ---
  function makeCloudTexture() {
    const s = 256, c = document.createElement('canvas'); c.width = c.height = s;
    const x = c.getContext('2d');
    for (let i = 0; i < 16; i++) {
      const cx = s * (0.2 + 0.6 * Math.random()), cy = s * (0.4 + 0.25 * Math.random()), rr = s * (0.1 + 0.16 * Math.random());
      const g = x.createRadialGradient(cx, cy, 0, cx, cy, rr);
      g.addColorStop(0, 'rgba(255,255,255,0.9)'); g.addColorStop(1, 'rgba(255,255,255,0)');
      x.fillStyle = g; x.beginPath(); x.arc(cx, cy, rr, 0, 7); x.fill();
    }
    const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace; return t;
  }
  const cloudTex = makeCloudTexture();
  const clouds = [];
  for (let i = 0; i < 10; i++) {
    const w = 6 + Math.random() * 7;
    const m = new THREE.Mesh(new THREE.PlaneGeometry(w, w * 0.5), new THREE.MeshBasicMaterial({
      map: cloudTex, transparent: true, opacity: 0.22 + Math.random() * 0.22, depthWrite: false, color: 0xc3b0ea
    }));
    m.userData.ang = Math.random() * Math.PI * 2;
    m.userData.rad = 16 + Math.random() * 18;
    m.userData.y = 3 + Math.random() * 11;
    m.userData.spd = 0.006 + Math.random() * 0.01; // dérive très lente (confort)
    clouds.push(m); scene.add(m);
  }
  function placeCloud(cl) {
    cl.position.set(Math.cos(cl.userData.ang) * cl.userData.rad, cl.userData.y, Math.sin(cl.userData.ang) * cl.userData.rad);
    cl.lookAt(0, cl.userData.y, 0);
  }
  clouds.forEach(placeCloud);

  // ============================================================
  //  DÉCORS « PLANTÉS » : on charge le cristal UNE fois, puis on
  //  en pose plusieurs sur l'herbe (position + taille + rotation).
  //  → C'est LA méthode pour planter n'importe quel décor 3D.
  // ============================================================
  const crystals = [];
  new GLTFLoader().load('models/crystal.glb', function (gltf) {
    const base = gltf.scene;
    const tints = [0xff33cc, 0x9b5cff, 0x3fe0d0, 0xff7ad0, 0x66aaff];
    const spots = [                                  // (x,z,s) au sol ; +y = FLOTTANT (à attraper en sautant)
      { x: 0,   z: -2.5, s: 0.42 },
      { x: -3,  z: -1.5, s: 0.30 }, { x: 3,  z: -3,   s: 0.30 },
      { x: 4.5, z: 2,    s: 0.32 }, { x: -4, z: 3,    s: 0.28 },
      { x: 1.5, z: 4.5,  s: 0.30 }, { x: -2, z: -4.5, s: 0.28 }, { x: 6, z: -1, s: 0.30 },
      { x: 2,  z: 1,  s: 0.34, y: 1.5 }, { x: -5, z: -2, s: 0.34, y: 1.7 },
      { x: 0,  z: 5,  s: 0.34, y: 1.4 }, { x: -1, z: -6, s: 0.34, y: 1.9 }
    ];
    for (let i = 0; i < spots.length; i++) {
      const c = base.clone(true);
      const s = spots[i].s;
      c.scale.setScalar(s);
      const y = (spots[i].y != null) ? spots[i].y : s * 1.3;
      c.position.set(spots[i].x, y, spots[i].z);
      c.rotation.y = i * 1.3;
      const tint = tints[i % tints.length];
      c.traverse(function (o) {
        if (o.isMesh && o.material) {
          o.material = o.material.clone();                       // matériau indépendant par cristal
          o.material.color = new THREE.Color(tint);
          o.material.emissive = new THREE.Color(tint);
          o.material.emissiveIntensity = 1.8;
          if ('transmission' in o.material) o.material.transmission = 0;
          o.material.roughness = 0.15; o.material.metalness = 0;
        }
      });
      c.userData = { collected: false, pop: 0, baseScale: s, floating: spots[i].y != null, baseY: y };
      scene.add(c);
      crystals.push(c);
    }
    totalCrystals = crystals.length;
    refreshHUD();
  });

  // --- Champignons (Meshy, réalistes) plantés sur l'herbe — obstacles-plateformes ---
  const mushrooms = [];                                 // (dandinement : seulement les plantés)
  const mushroomObstacles = [];                         // {x,z,r,top} : à SAUTER par-dessus / se poser dessus
  new GLTFLoader().load('models/mushroom_meshy.glb?v=1', function (gltf) {
    const base = gltf.scene;
    base.traverse(o => { if (o.isMesh) { const mats = Array.isArray(o.material) ? o.material : [o.material]; for (const mt of mats) if (mt) mt.side = THREE.DoubleSide; } });
    mushroomBase = base;                                // réutilisé pour le jardinage
    assetBase.mushroom = base;                          // pour l'éditeur
    const bbox0 = new THREE.Box3().setFromObject(base);
    const rawH = bbox0.getSize(new THREE.Vector3()).y || 1;
    const capOffset = -bbox0.min.y;                    // |min.y| : garde la base au sol pendant le squash
    const spots = [                                   // (x,z) + hauteur cible ; AUCUN sur la route
      { x: -1.5, z: -3, h: 0.62 }, { x: 2.5, z: -4,   h: 0.55 },
      { x: -6,   z: -4, h: 0.60 }, { x: 3.5, z: 3.5,  h: 0.74 },
      { x: -2.5, z: 4,  h: 0.52 }, { x: 0.5, z: 2.8,  h: 0.60 }, { x: 6, z: 4, h: 0.58 }
    ];
    for (let i = 0; i < spots.length; i++) {
      if (onRoad(spots[i].x, spots[i].z)) continue;     // jamais de champignon sur la route
      const m = base.clone(true);
      const sc = spots[i].h / rawH;
      m.scale.setScalar(sc);
      m.position.set(spots[i].x, capOffset * sc, spots[i].z);   // base au sol (modèle centré)
      m.rotation.y = i * 1.3;
      scene.add(m);
      const bb = new THREE.Box3().setFromObject(m);
      mushroomObstacles.push({ x: spots[i].x, z: spots[i].z, r: Math.max(bb.max.x - bb.min.x, bb.max.z - bb.min.z) / 2 * 0.6, top: bb.max.y * 0.82, mesh: m, base: sc, gk: capOffset, squash: 0, squashV: 0 });
    }
  });

  // ============================================================
  //  ROUTE stylisée : chaussée bitume + ligne pointillée + 2 trottoirs surélevés (marchables)
  // ============================================================
  {
    function makeAsphaltTex() {
      const c = document.createElement('canvas'); c.width = c.height = 128; const x = c.getContext('2d');
      x.fillStyle = '#565a63'; x.fillRect(0, 0, 128, 128);                        // bitume gris-bleu doux
      for (let i = 0; i < 500; i++) { const g = 70 + (Math.random() * 40 | 0); x.fillStyle = 'rgba(' + g + ',' + (g + 4) + ',' + (g + 12) + ',0.5)'; x.fillRect(Math.random() * 128, Math.random() * 128, 2, 2); }
      // ROUTE À 2 VOIES : lignes de bord blanches continues + ligne centrale pointillée
      x.fillStyle = '#e9e4d2'; x.fillRect(0, 9, 128, 5); x.fillRect(0, 114, 128, 5);   // lignes de bord (le long de la route)
      x.fillStyle = '#f2e7c4'; x.fillRect(24, 60, 80, 7);                          // ligne centrale pointillée (sépare les 2 voies)
      const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace; t.wrapS = t.wrapT = THREE.RepeatWrapping; t.repeat.set(ROAD.len / 4, 1); return t;
    }
    function makeSideTex() {
      const c = document.createElement('canvas'); c.width = c.height = 128; const x = c.getContext('2d');
      x.fillStyle = '#c3bcaa'; x.fillRect(0, 0, 128, 128);                         // dalles béton clair
      x.strokeStyle = 'rgba(120,114,102,0.6)'; x.lineWidth = 4;
      for (let i = 0; i <= 128; i += 32) { x.beginPath(); x.moveTo(i, 0); x.lineTo(i, 128); x.stroke(); x.beginPath(); x.moveTo(0, i); x.lineTo(128, i); x.stroke(); }
      const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace; t.wrapS = t.wrapT = THREE.RepeatWrapping; t.repeat.set(ROAD.len / 1.5, 1); return t;
    }
    const road = new THREE.Mesh(new THREE.PlaneGeometry(ROAD.len, ROAD.w), new THREE.MeshStandardMaterial({ map: makeAsphaltTex(), roughness: 1, metalness: 0 }));
    road.rotation.x = -Math.PI / 2; road.position.set(0, 0.012, ROAD.z); scene.add(road);   // juste au-dessus de l'herbe
    const sideTex = makeSideTex();
    for (const sgn of [-1, 1]) {
      const zc = ROAD.z + sgn * (ROAD.w / 2 + ROAD.sideW / 2);
      const s = new THREE.Mesh(new THREE.BoxGeometry(ROAD.len, ROAD.sideH, ROAD.sideW), new THREE.MeshStandardMaterial({ map: sideTex, roughness: 1, metalness: 0 }));
      s.position.set(0, ROAD.sideH / 2, zc); scene.add(s);
      walkPlatforms.push({ x0: -ROAD.len / 2, x1: ROAD.len / 2, z0: zc - ROAD.sideW / 2, z1: zc + ROAD.sideW / 2, h: ROAD.sideH });   // trottoir = plateforme montable
    }
  }

  // helper : poser un modèle importé avec sa base sur l'herbe (y=0)
  function groundOffset(obj) { return -new THREE.Box3().setFromObject(obj).min.y; }

  // --- Barrières rouge/blanc : chargées comme BASE pour la palette éditeur (plus placées par défaut) ---
  new GLTFLoader().load('models/barrier.glb?v=1', function (gltf) {
    const base = gltf.scene;
    base.traverse(o => { if (o.isMesh) { const mats = Array.isArray(o.material) ? o.material : [o.material]; for (const mt of mats) if (mt) mt.side = THREE.DoubleSide; } });
    assetBase.barrier = base;                          // dispo dans l'éditeur (à poser toi-même)
  });

  // --- Arbres low-poly (Poly Pizza) plantés ---
  new GLTFLoader().load('models/pp_tree.glb', function (gltf) {
    const base = gltf.scene;
    const off = groundOffset(base);                 // hauteur à remonter pour poser la base au sol
    treeBase = base; treeOffset = off;              // réutilisé pour le jardinage
    assetBase.tree = base;                          // dispo dans l'éditeur (mais plus placés par défaut)
    // (arbres par défaut retirés — à reposer via l'éditeur si voulu)
  });

  // --- Maison storybook (Poly Pizza) ---
  // --- Chaumière (Poly Pizza) : chargée comme BASE pour la palette éditeur (plus placée par défaut) ---
  new GLTFLoader().load('models/pp_cartoonhouse.glb', function (gltf) {
    assetBase.cottage = gltf.scene;
  });

  // --- Maison-carotte (Meshy) : chargée comme BASE pour la palette éditeur (plus placée par défaut) ---
  new GLTFLoader().load('models/carrot_meshy.glb?v=1', function (gltf) {
    assetBase.carrot = gltf.scene;
  });

  // --- Maisons Meshy (chargées uniquement comme BASE pour la palette de l'éditeur) ---
  ['house1', 'house2', 'bakery', 'windmill', 'lamp'].forEach(function (key) {
    const file = key === 'bakery' ? 'house_bakery' : key;
    new GLTFLoader().load('models/' + file + '.glb', function (gltf) {
      const b = gltf.scene;
      b.traverse(o => { if (o.isMesh) { const mats = Array.isArray(o.material) ? o.material : [o.material]; for (const mt of mats) if (mt) mt.side = THREE.DoubleSide; } });
      assetBase[key] = b;
    });
  });

  // --- MOULIN ANIMÉ : tour + pales séparées (les pales tournent) ---
  const HUB = { x: 0.0, y: 0.45, z: 0.72 };    // position des pales sur la tour (à régler au rendu)
  const BLADE_SCALE = 1.0;                       // taille des pales
  function dside(o) { o.traverse(x => { if (x.isMesh) { const m = Array.isArray(x.material) ? x.material : [x.material]; for (const mt of m) if (mt) mt.side = THREE.DoubleSide; } }); }
  new GLTFLoader().load('models/windmill2.glb', function (gt) {
    dside(gt.scene);
    new GLTFLoader().load('models/windmill2_blades.glb', function (gb) {
      dside(gb.scene);
      const blades = gb.scene; blades.name = 'BLADES';
      blades.position.set(HUB.x, HUB.y, HUB.z); blades.scale.setScalar(BLADE_SCALE);
      const grp = new THREE.Group();
      grp.add(gt.scene); grp.add(blades);
      assetBase.windmill2 = grp;
    });
  });

  // ============================================================
  //  JEU étape 2 : la BULLE irisée à souffler jusqu'au PORTAIL
  //  (DÉSACTIVÉE pour l'instant : BUBBLE_ON = false — code gardé pour plus tard)
  // ============================================================

    } else {                                              // === PILOTAGE : la bulle reste à hauteur, on l'ORIENTE ===
      if (blowing) {
        camera.getWorldPosition(_head); camera.getWorldDirection(_look);
        _look.y = 0;                                       // souffle HORIZONTAL uniquement
        _toB.copy(bubble.position).sub(_head); _toB.y = 0;
        const dist = _toB.length();
        if (dist < 6.5 && dist > 0.05 && _look.lengthSq() > 0.01) {
          _look.normalize(); _toB.normalize();
          if (_toB.dot(_look) > 0.25) bubbleVel.addScaledVector(_look, 11 * dt);   // pousse vers où tu regardes
        }
      }
      bubbleVel.y = 0;                                    // PAS de gravité : la bulle ne tombe JAMAIS
      bubbleVel.multiplyScalar(0.94);                     // traînée (s'arrête doucement quand tu ne souffles plus)
      bubble.position.addScaledVector(bubbleVel, dt);
      bubble.position.y = HOVER_Y;                        // verrouillée à hauteur des yeux
      // GONDOLEMENT façon bulle de savon : les axes ondulent (déphasés) → elle se déforme du petit au grand
      const w = 0.10;
      bubble.scale.set(
        1 + Math.sin(time * 0.0031) * w,
        1 + Math.sin(time * 0.0023 + 1.7) * w,
        1 + Math.sin(time * 0.0027 + 3.1) * w
      );
      bubble.material.iridescenceIOR = 1.3 + Math.sin(time * 0.001) * 0.45;   // scintillement irisé animé
      trailT += dt;
      if (trailT > 0.045 && bubbleVel.lengthSq() > 0.4) {                     // dépose une trace si elle bouge
        trailT = 0;
        const tm = trail[trailIdx]; trailIdx = (trailIdx + 1) % trail.length;
        tm.position.copy(bubble.position); tm.visible = true; tm.material.opacity = 0.32; tm.scale.setScalar(0.9);
      }
      const bpr = Math.hypot(bubble.position.x, bubble.position.z);
      if (bpr > GARDEN_R - 1) { bubble.position.x *= (GARDEN_R - 1) / bpr; bubble.position.z *= (GARDEN_R - 1) / bpr; bubbleVel.multiplyScalar(0.4); }
      for (const o of obstacles) { if (bubble.position.distanceToSquared(o.pos) < (o.r + 0.28) * (o.r + 0.28)) { popBubble(); break; } } // touche un OBJET → éclate
      if (bubblePopT < 0 && bubble.position.distanceTo(PORTAL_POS) < 1.0) bubbleWarpT = 0;  // entre dans le portail
    }
    portal.rotation.z += dt * 0.6;
    portal.scale.setScalar(1 + Math.sin(time * 0.004) * 0.05);
    // traînée de la bulle : fondu
    for (const tm of trail) { if (!tm.visible) continue; tm.material.opacity -= dt * 0.7; tm.scale.multiplyScalar(1 - dt * 0.4); if (tm.material.opacity <= 0) tm.visible = false; }
    }
    if (hudFlashUntil && time > hudFlashUntil) { hudFlashUntil = 0; updateHUD(hudBase); }
    // papillons : vol + battement d'ailes
    const bt = time * 0.001;
    for (const bf of butterflies) {
      const u = bf.userData;
      const nx = u.cx + Math.cos(bt * u.sp + u.ph) * u.r;
      const nz = u.cz + Math.sin(bt * u.sp * 1.1 + u.ph) * u.r;
      bf.position.set(nx, u.baseY + Math.sin(bt * 2 + u.ph) * 0.4, nz);
      bf.rotation.y = Math.atan2(nx - u.px, nz - u.pz);
      u.px = nx; u.pz = nz;
      const flap = Math.sin(time * 0.02 + u.ph) * 0.9;
      u.lw.rotation.z = flap; u.rw.rotation.z = -flap;
    }
    // champignons : dandinement cartoon (ressort + balancement), désynchronisés
    for (const m of mushrooms) {
      if (m.userData.grow && m.userData.grow.t < 1) continue;   // pendant la pousse : pas de wobble
      const mu = m.userData.mush, s = Math.sin(bt * 2 + mu.ph);
      m.scale.set(mu.base * (1 + 0.05 * s), mu.base * (1 - 0.06 * s), mu.base * (1 + 0.05 * s)); // squash & stretch
      m.rotation.z = 0.05 * Math.sin(bt * 1.3 + mu.ph);         // léger balancement
    }

    if (GAME_ENABLED) tex.needsUpdate = true;
    renderer.render(scene, camera);
  });
</script>
